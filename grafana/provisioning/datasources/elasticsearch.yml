apiVersion: 1

datasources:
  - name: Elasticsearch
    uid: es-logs                          # stable uid so dashboards can reference it
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200        # reachable via the compose network by service name
    isDefault: true
    editable: true
    jsonData:
      index: "logs"                        # the index Grafana queries
      timeField: "@timestamp"              # required time field for time-series queries
      esVersion: "8.0.0"
      logMessageField: "message"
      logLevelField: "level"
      maxConcurrentShardRequests: 5
