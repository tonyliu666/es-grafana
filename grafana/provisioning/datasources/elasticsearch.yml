apiVersion: 1

datasources:
  - name: Elasticsearch
    uid: es-logs                          # stable uid so dashboards can reference it
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200        # reachable via the compose network by service name
    isDefault: true
    editable: true
    jsonData:
      index: "logs"                        # the index Grafana queries
      timeField: "@timestamp"              # required time field for time-series queries
      esVersion: "8.0.0"
      logMessageField: "message"
      logLevelField: "level"
      maxConcurrentShardRequests: 5

  # second data source: same ES cluster, the RAW nested scan index.
  # No flatten ETL — Grafana aggregates the object-flattened arrays directly.
  - name: Elasticsearch - scan-repo
    uid: es-scan-repo
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    isDefault: false
    editable: true
    jsonData:
      index: "scan-repo-nested"
      timeField: "@timestamp"
      esVersion: "8.0.0"
      maxConcurrentShardRequests: 5

  # Infinity datasource pointed at the SAME ES cluster. Used only by the two
  # detail tables: it fetches the raw nested docs from _search and explodes the
  # compliant / non_compliant arrays into one row per finding (JSONata backend
  # root_selector), reproducing the original per-finding tables without any
  # flatten ETL.
  - name: Infinity - scan-repo
    uid: es-infinity
    type: yesoreyeram-infinity-datasource
    access: proxy
    isDefault: false
    editable: true
    jsonData:
      # allow the datasource to reach the in-network ES service
      allowedHosts:
        - http://elasticsearch:9200
      tlsSkipVerify: true
